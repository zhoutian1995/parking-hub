name: Deploy to Aliyun

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Deploy to server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Download latest code from GitHub
          cd /home/admin/project/parking-hub
          curl -sL "https://api.github.com/repos/zhoutian1995/parking-hub/zipball/main" -o parking-hub.zip
          unzip -o parking-hub.zip
          mv */* . 2>/dev/null || true
          mv */.* . 2>/dev/null || true
          rmdir */ 2>/dev/null || true
          rm -f parking-hub.zip
          
          # Install dependencies
          npm install
          
          # Restart service with PM2
          pm2 delete parking-hub 2>/dev/null || true
          pm2 start backend/server.js --name parking-hub
          pm2 save
